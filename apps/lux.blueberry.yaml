desc: |
  A fun platformer with gliding and wall jumps.

  This is a port of [Antcopter](https://edubart.itch.io/antcopter) ([source](https://github.com/edubart/antcopter)) by [Eduardo Bart](https://github.com/edubart). The port is a complete rewrite from Nelua to Go with some bugfixes and new graphics.

  ## Credits

  * Original game: [Antcopter](https://edubart.itch.io/antcopter) by [Eduardo Bart](https://github.com/edubart).
  * Level assets: [Peaceful nightfield](https://trixelized.itch.io/nightfield) by [Trixie](https://trixelized.itch.io/).
  * Port: Firefly Zero core team.
